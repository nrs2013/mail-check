<script>
(function() {

  // 添付ファイル付きメールのID一覧を取得（Gmail検索の has:attachment を使う）
  async function loadAttachmentIds() {

  // 野村宛メール用：添付ファイル「個数」を get_thread で取得（Gmail MCPはファイル名を返さない）
  // attachmentIds配列の長さだけ取得して表示
  async function loadAttachmentDetailsForNomura(nomuraThreads) {
    const targets = nomuraThreads.filter(t =>
      t._attachmentDetails === undefined
    ).slice(0, 15);
    if (targets.length === 0) return;
    const fetchOne = async (t) => {
      try {
        const result = await window.cowork.callMcpTool(GET_THREAD_TOOL, {
          threadId: t.id, messageFormat: "FULL_CONTENT"
        });
        const data = parseResult(result);
        const messages = (data && data.messages) || [];
        let totalCount = 0;
        messages.forEach(msg => {
          const ids = msg.attachmentIds || msg.attachments || [];
          if (Array.isArray(ids)) totalCount += ids.length;
        });
        // 個数だけ保存（ファイル名は取れないので {count: N} 形式）
        t._attachmentDetails = totalCount > 0 ? [{ count: totalCount }] : [];
      } catch(e) {
        t._attachmentDetails = [];

      renderColumns();
    }
  }

  function attIconFor(mime, name) {
    const m = (mime || "").toLowerCase();

    if (/pdf/.test(m) || /\.pdf$/.test(n)) return "📄";
    if (/image|png|jpe?g|gif|webp|heic|tif/.test(m) || /\.(png|jpe?g|gif|webp|heic|tif)$/.test(n)) return "🖼️";
    if (/word|doc/.test(m) || /\.docx?$/.test(n)) return "📝";
    if (/excel|sheet|xls/.test(m) || /\.xlsx?$/.test(n)) return "📊";
    if (/powerpoint|ppt/.test(m) || /\.pptx?$/.test(n)) return "📈";
    if (/zip|rar|tar|7z/.test(m) || /\.(zip|rar|tar|7z)$/.test(n)) return "🗜️";
    if (/video|mp4|mov|avi/.test(m) || /\.(mp4|mov|avi|mkv)$/.test(n)) return "🎬";
    if (/audio|mp3|wav|m4a/.test(m) || /\.(mp3|wav|m4a|aac)$/.test(n)) return "🎵";
    if (/dwg|dxf|cad/.test(m) || /\.(dwg|dxf|cad)$/.test(n)) return "📐";

  // スレッド内の最新メッセージを取得（日付でソートして最後のもの）
  function lastMessageOf(thread) {
    const msgs = thread.messages || [];
    if (msgs.length === 0) return {};
    if (msgs.length === 1) return msgs[0];
    return msgs.slice().sort((a, b) => String(a.date).localeCompare(String(b.date)))[msgs.length - 1];
  }

  // 10日以内かどうかチェック（クライアント側の念押しフィルタ）
  const TEN_DAYS_MS = 10 * 86400000;
  function isWithin10Days(thread) {
    const last = lastMessageOf(thread);
    if (!last.date) return false;
    const diff = Date.now() - new Date(last.date).getTime();
    return diff >= 0 && diff <= TEN_DAYS_MS;
  }

  // 本文冒頭に「野村」が出てくるメールを判定
  function startsWithNomura(thread) {
    const msgs = thread.messages || [];
    const last = msgs[msgs.length - 1] || {};
    let snippet = (last.snippet || "").replace(/<[^>]+>/g, "").trim();
    if (!snippet) return false;
    const head = snippet.slice(0, 120);
    // 「野村」+ 敬称・名前パターン
    return /野村(様|さん|さま|殿|くん|君|氏|裕紀|ヒロノリ|ひろのり|ヒロ|宛|御中|チーム|プロデューサー|演出)/u.test(head)
        || /^[\s　【\[「『]*野村[\s　,、]/u.test(head);
  }

  document.getElementById("filter-" + currentFilter).classList.add("active");
  document.getElementById("filter-" + (currentFilter === "unread" ? "all" : "unread")).classList.remove("active");
  document.getElementById("hide-ads").checked = hideAds;

  function escapeHtml(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const now = new Date();
    const diffH = (now - d) / 36e5;
    if (diffH < 24) return d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    if (diffH < 24 * 7) return d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" });
    return d.toLocaleDateString("ja-JP", { year: "2-digit", month: "numeric", day: "numeric" });
  }
  function fmtFullDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString("ja-JP");
  }
  function dateGroupKey(iso) {
    if (!iso) return "unknown";
    const d = new Date(iso);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function dateGroupLabel(iso) {
    if (!iso) return "(日付不明)";
    const d = new Date(iso);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((today - target) / 86400000);
    const wdays = ["日", "月", "火", "水", "木", "金", "土"];
    const wd = wdays[d.getDay()];
    if (diffDays === 0) return "今日 · " + (d.getMonth() + 1) + "/" + d.getDate() + " (" + wd + ")";
    if (diffDays === 1) return "昨日 · " + (d.getMonth() + 1) + "/" + d.getDate() + " (" + wd + ")";
    if (diffDays < 7) return diffDays + "日前 · " + (d.getMonth() + 1) + "/" + d.getDate() + " (" + wd + ")";
    if (d.getFullYear() === now.getFullYear()) return (d.getMonth() + 1) + "月" + d.getDate() + "日 (" + wd + ")";
    return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate() + " (" + wd + ")";
  }
  // MIMEエンコードされた文字列をデコード（=?UTF-8?B?...?= や =?ISO-2022-JP?Q?...?= など）
  function decodeMimeWord(str) {
    if (!str || typeof str !== "string") return str;
    if (str.indexOf("=?") === -1) return str;
    return str.replace(/=\?([^?]+)\?([BQbq])\?([^?]*)\?=(\s*)/g, (match, charset, enc, text, ws) => {
      try {
        let bytes;
        if (enc.toUpperCase() === "B") {
          const bin = atob(text);
          bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        } else {
          // Q encoding (quoted-printable)
          const decoded = text.replace(/_/g, " ").replace(/=([0-9A-Fa-f]{2})/g, (m, hex) => String.fromCharCode(parseInt(hex, 16)));
          bytes = new Uint8Array(decoded.length);
          for (let i = 0; i < decoded.length; i++) bytes[i] = decoded.charCodeAt(i) & 0xff;
        }
        const cs = charset.toLowerCase();
        // TextDecoder はブラウザで utf-8 / iso-2022-jp / shift_jis / euc-jp 対応
        const decoder = new TextDecoder(cs === "utf8" ? "utf-8" : cs);
        return decoder.decode(bytes);
      } catch(e) {
        return match;
      }
    }).replace(/\?=\s+=\?/g, "?==?"); // 連続MIMEワードの間の空白除去
  }

  function senderName(s) {
    if (!s) return "(不明)";
    const decoded = decodeMimeWord(s);
    const m = decoded.match(/^"?([^"<]+?)"?\s*<.+>$/);
    if (m) return m[1].trim();
    if (decoded.includes("@")) return decoded.split("@")[0];
    return decoded;
  }
  function senderEmail(s) {
    if (!s) return "";
    const m = s.match(/<([^>]+)>/);
    if (m) return m[1].toLowerCase();
    return s.toLowerCase();
  }
  function senderDomain(s) {
    const e = senderEmail(s);
    const at = e.lastIndexOf("@");
    return at >= 0 ? e.slice(at + 1) : "";
  }
  function hasJapanese(s) { return /[぀-ゟ゠-ヿ一-鿿]/.test(s || ""); }

  function isExactlyToMe(thread) {
    const msgs = thread.messages || [];
    for (const msg of msgs) {

    }
    return false;
  }
  function isExactlyCcMe(thread) {
    const msgs = thread.messages || [];
    for (const msg of msgs) {
      const ccs = (msg.ccRecipients || []).map(r => String(r).toLowerCase());
      if (ccs.some(c => c === ME || c.includes("<" + ME + ">"))) return true;

  }

  // snippet 本文から日本語名抽出（フルネーム優先）
  function extractJapaneseNameFromSnippet(snippet) {
    if (!snippet) return null;

    const patterns = [
      /株式会社\s*([一-鿿ぁ-ゖァ-ヺー]{2,12})\s*[\s,、]?\s*([一-鿿]{2,5})/,
      /有限会社\s*([一-鿿ぁ-ゖァ-ヺー]{2,12})\s*[\s,、]?\s*([一-鿿]{2,5})/,
      /([一-鿿ぁ-ゖァ-ヺー]{2,10})\s*の\s*([一-鿿]{2,5})\s*です/,
      /([一-鿿ぁ-ゖァ-ヺー]{2,10})\s*の\s*([一-鿿]{2,5})\s*と申します/,
      /([一-鿿]{2,5})\s*です[。\s,]/,
      /([一-鿿]{2,5})\s*と申します/,
      /([一-鿿]{2,5})\s*より/,
    ];
    for (const p of patterns) {
      const m = s.match(p);
      if (m) {
        if (m[2]) return m[1] + " " + m[2];
        return m[1];
      }

  }

  const personalDomains = new Set([

  function lookupOrgName(domain) {

  function parseResult(result) {
    if (!result) return null;
    if (typeof result === "string") {
      try { return JSON.parse(result); } catch (e) { return { _raw: result }; }
    }
    if (result.content && Array.isArray(result.content)) {
      const textPart = result.content.find(c => c.type === "text");
      if (textPart && textPart.text) {
        try { return JSON.parse(textPart.text); } catch (e) { return { _raw: textPart.text }; }
      }
    }
    if (result.result) return parseResult(result.result);
    return result;

  // 広告判定すべきメアドのローカル部（@より前）リスト
  const adLocalParts = new Set([
    "noreply", "no-reply", "donotreply", "do-not-reply",

  function ruleClassify(thread) {
    const msgs = thread.messages || [];
    const last = msgs[msgs.length - 1] || {};
    const email = senderEmail(last.sender);
    const domain = senderDomain(last.sender);
    const localPart = email.split("@")[0];
    const subj = (last.subject || "").toLowerCase();

    // 広告ドメイン判定
    const adDomains = Object.keys(adNameMap);
    const isAdDomain = adDomains.some(d => domain === d || domain.endsWith("." + d));
    if (isAdDomain) return { kind: "ad" };

    // ローカル部完全一致
    if (adLocalParts.has(localPart)) return { kind: "ad" };

    // ローカル部 prefix（"store+xxx", "info-xxx", "newsletter-xxx" など）
    if (/^(store\+|store-|noreply|no-reply|newsletter|news-|info-|info\d|notify|alert|update|order|shipment|delivery|tracking|payment|billing|admin|customer|member|press|marketing|promotion|do-not-reply|donotreply|automated|automation|mailer|email|posts-|recap|recaps)/i.test(localPart)) {
      return { kind: "ad" };

    // 件名キーワード

  // 送信者名 学習システム
  // ============================================================
  // 1. 仕事カテゴリ（reply / info）の未知送信者だけ処理
  // 2. get_thread で本文を取得（Snippetだと署名が見えない）
  // 3. AIに「本文署名や自己紹介から、送信者の正式な日本語名のみ抽出」を依頼

  async function fetchFullBodyForSender(thread) {
    try {
      const result = await window.cowork.callMcpTool(GET_THREAD_TOOL, {
        threadId: thread.id, messageFormat: "FULL_CONTENT"
      });
      const data = parseResult(result);
      const messages = (data && data.messages) || [];
      const last = messages[messages.length - 1] || {};
      let body = (last.body || last.snippet || "");
      body = String(body).replace(/<[^>]+>/g, "");
      return body;
    } catch (e) { return ""; }

  // バックグラウンドで未知の送信者の名前を学習
  async function learnSenderNames(threads) {
    // 仕事系（reply/info）かつアドレス帳に未登録の送信者だけ
    const seen = new Map(); // email → thread (重複削除)
    threads.forEach(t => {
      if (!t._kind || t._kind === "ad" || t._kind === "loading") return;
      const last = (t.messages || [])[(t.messages || []).length - 1] || {};
      const email = senderEmail(last.sender);
      if (!email) return;
      if (getSenderName(email)) return; // 既に学習済み
      const domain = senderDomain(last.sender);
      if (personalDomains.has(domain)) return; // 個人メアドは学習しない
      // 通知系ローカル部はスキップ
      const local = email.split("@")[0];
      if (/^(noreply|no-reply|donotreply|info|news|notice|notify|alert|update|order|shipment|delivery|tracking|payment|billing|admin|customer|member|press|marketing|store|support|service|help|auto-confirm|order-update|shipment-tracking|magazine|newsletter|mailer|reservation|booking|confirmation|receipt|webmaster|account|hello|system|posts-recaps|event)/i.test(local)) {
        // 通知系は学習スキップ（既にドメイン辞書で組織名出る）
        return;
      }
      if (!seen.has(email)) seen.set(email, t);
    });

    const todo = Array.from(seen.entries()).slice(0, 12); // 1回最大12件
    if (todo.length === 0) return;

    // 各送信者の本文を並列取得
    const samples = await Promise.all(todo.map(async ([email, thread]) => {
      const body = await fetchFullBodyForSender(thread);
      return { email, body };
    }));

    // AI抽出（5件ずつバッチ）
    for (let i = 0; i < samples.length; i += 5) {
      const batch = samples.slice(i, i + 5);
      const result = await aiExtractSenderNamesBatch(batch);
      batch.forEach((s, j) => {
        if (result[j]) {
          saveSenderName(s.email, result[j], "ai");
        } else {
          // null だった場合、再試行を防ぐためダミーを保存
          saveSenderName(s.email, "", "ai-failed");
        }
      });
    }
  }

  // 表示名ロジック（優先順）：
  // 1. アドレス帳に保存済み（手動 > AI抽出）→ それを使う
  // 2. From に表示名（Name <email>形式）→ そのまま使う
  // 3. ピュアなメアドのみ → ドメイン辞書 → 「ローカル @ ドメイン/組織」
  function displayNameOf(thread) {
    const last = (thread.messages || [])[(thread.messages || []).length - 1] || {};
    const sender = decodeMimeWord(last.sender || "");
    if (!sender) return "(不明)";
    const email = senderEmail(sender);

    // 1. アドレス帳ヒット → 「名前 · 組織」or「名前」
    const stored = getSenderName(email);
    if (stored && stored.length > 0) {
      const domain = senderDomain(sender);
      const org = lookupOrgName(domain);
      if (org && !stored.includes(org) && !stored.includes("@")) {
        return stored + " · " + org;
      }
      return stored;
    }

    // 2. "Display Name <email@example.com>" 形式
    const m = sender.match(/^"?([^"<]+?)"?\s*<.+>$/);
    if (m) {
      const name = m[1].trim();
      if (name) return name;
    }
    // 3. メアドだけ → ドメイン辞書
    if (!sender.includes("@")) return sender;
    const at = sender.lastIndexOf("@");
    const local = sender.slice(0, at);
    const domain = sender.slice(at + 1).toLowerCase();
    const org = lookupOrgName(domain);
    if (org) {
      if (/^(noreply|no-reply|donotreply|do-not-reply|info|news|notice|notify|alert|update|order|shipment|delivery|tracking|payment|billing|admin|customer|member|press|marketing|store|support|service|help|auto-confirm|order-update|shipment-tracking|magazine|newsletter|mailer|reservation|booking|confirmation|receipt|webmaster|account|hello|system|posts-recaps|event)/i.test(local)) {
        return org;
      }
      return local + " @ " + org;
    }
    if (personalDomains.has(domain)) return sender;
    return local + " @ " + domain;
  }

  // 本文を読みやすく整形：HTMLタグ→改行変換、エンティティ復号、改行保持
  function cleanBodyText(rawBody) {
    if (!rawBody) return "";
    let body = String(rawBody);
    // HTML特殊タグを改行に変換
    body = body
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/(p|div|li|tr|h[1-6]|article|section|blockquote)>/gi, "\n")
      .replace(/<(p|div|li|h[1-6])[^>]*>/gi, "\n")
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, "")
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, "")
      .replace(/<[^>]+>/g, ""); // 残りのタグを削除
    // HTMLエンティティ復号（よく使うものだけ手動で対応）
    body = body
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'")
      .replace(/&nbsp;/g, " ")
      .replace(/&yen;/g, "¥")
      .replace(/&hellip;/g, "…")
      .replace(/&mdash;/g, "—")
      .replace(/&ndash;/g, "–")
      .replace(/&#(\d+);/g, (m, n) => String.fromCharCode(parseInt(n, 10)))
      .replace(/&#x([0-9a-f]+);/gi, (m, h) => String.fromCharCode(parseInt(h, 16)));
    // 連続改行を最大2行に圧縮、行頭末空白を除去
    body = body
      .split(/\r?\n/)
      .map(line => line.replace(/[ 　\s]+$/, "")) // 行末空白
      .join("\n")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
    return escapeHtml(body);
  }

      const data = parseResult(result);

      const allAtts = [];

        }
      });
      // 添付エリアを描画
      const attArea = document.getElementById("attachments-area");
      if (allAtts.length > 0) {
        const fmtSize = (b) => {
          if (!b) return "";
          if (b < 1024) return b + "B";
          if (b < 1024*1024) return (b/1024).toFixed(0) + "KB";
          return (b/1024/1024).toFixed(1) + "MB";
        };
        const iconFor = (mime) => {
          if (/pdf/.test(mime)) return "📄";
          if (/image|png|jpeg|jpg|gif|webp/.test(mime)) return "🖼️";
          if (/word|doc/.test(mime)) return "📝";
          if (/excel|sheet|xls/.test(mime)) return "📊";
          if (/powerpoint|ppt/.test(mime)) return "📈";
          if (/zip|rar|tar/.test(mime)) return "🗜️";
          if (/video|mp4|mov/.test(mime)) return "🎬";
          if (/audio|mp3|wav/.test(mime)) return "🎵";
          return "📎";
        };
        attArea.innerHTML = '<div class="attachment-list">' +
          '<div class="label-row">📎 添付ファイル (' + allAtts.length + ')</div>' +
          allAtts.map(a => '<div class="att-chip">' +
            '<span>' + iconFor(a.mime) + '</span>' +
            '<span class="att-name">' + escapeHtml(a.name) + '</span>' +
            (a.size ? '<span class="att-size">' + fmtSize(a.size) + '</span>' : '') +
          '</div>').join("") +
        '</div>';
      }

      // 本文表示
      const html = messages.map(msg => {
        return '<div class="msg-block">' +
          '<div class="msg-head"><span class="msg-from">' + escapeHtml(senderName(msg.sender)) + '</span> <span class="msg-email">&lt;' + escapeHtml(senderEmail(msg.sender)) + '&gt;</span><br><span class="msg-date">' + escapeHtml(fmtFullDate(msg.date)) + '</span></div>' +
          renderRecipients("To", msg.toRecipients) +
          renderRecipients("Cc", msg.ccRecipients) +
          '<div class="msg-body">' + cleanBodyText(msg.body || msg.snippet || "") + '</div>' +
        '</div>';
      }).join("");
      document.getElementById("modal-body").innerHTML = html;

      // Mail.app リンク用データを準備（3パターン：送信者のみ / 全員 / 転送）
      const lastMsg = messages[messages.length - 1] || {};
      const senderAddr = senderEmail(lastMsg.sender);
      const rawSubj = decodeMimeWord(lastMsg.subject || "");
      const replySubj = /^re:/i.test(rawSubj) ? rawSubj : "Re: " + rawSubj;
      const fwdSubj = /^fwd?:/i.test(rawSubj) ? rawSubj : "Fwd: " + rawSubj;
      // 短い引用本文（mailto URL長すぎ問題回避）
      const shortQuote = "\n\n--- " + senderName(lastMsg.sender) + " さんのメール ---\n" + ((lastMsg.body || lastMsg.snippet || "").replace(/<[^>]+>/g, "").slice(0, 300));
      // To/Ccから自分(ME)を除外したリストを作る → 全員返信用
      const extractEmail = (s) => {
        const m = String(s || "").match(/<([^>]+)>/);
        return (m ? m[1] : String(s || "")).trim().toLowerCase();
      };
      const toList = (lastMsg.toRecipients || []).map(extractEmail).filter(e => e && e !== ME);
      const ccList = (lastMsg.ccRecipients || []).map(extractEmail).filter(e => e && e !== ME);
      // 全員返信：to=送信者+元のTo, cc=元のCc
      const allTo = [senderAddr, ...toList].filter((v,i,a) => a.indexOf(v) === i); // 重複排除
      const allCc = ccList.filter((v,i,a) => a.indexOf(v) === i);

      state.replyData = { to: senderAddr, subject: replySubj, body: shortQuote };

      // 1. 送信者のみに返信
      const mailtoSender = "mailto:" + senderAddr
        + "?subject=" + encodeURIComponent(replySubj)
        + "&body=" + encodeURIComponent(shortQuote);
      // 2. 全員に返信
      const mailtoAll = "mailto:" + allTo.join(",")
        + "?subject=" + encodeURIComponent(replySubj)
        + (allCc.length ? "&cc=" + encodeURIComponent(allCc.join(",")) : "")
        + "&body=" + encodeURIComponent(shortQuote);
      // 3. 転送（宛先空、件名 Fwd:、本文に元メール）
      const mailtoFwd = "mailto:"
        + "?subject=" + encodeURIComponent(fwdSubj)
        + "&body=" + encodeURIComponent("\n\n--- 転送 ---\nFrom: " + senderName(lastMsg.sender) + " <" + senderAddr + ">\nSubject: " + rawSubj + "\n\n" + ((lastMsg.body || lastMsg.snippet || "").replace(/<[^>]+>/g, "").slice(0, 600)));

      document.getElementById("mail-reply-sender").href = mailtoSender;
      document.getElementById("mail-reply-all").href = mailtoAll;
      document.getElementById("mail-forward").href = mailtoFwd;
      // 全員返信ボタンは To/Cc に他に誰もいなければ無効化
      const replyAllBtn = document.getElementById("mail-reply-all");
      if (allTo.length <= 1 && allCc.length === 0) {
        replyAllBtn.style.opacity = "0.4";
        replyAllBtn.style.pointerEvents = "none";
        replyAllBtn.title = "他の宛先がいないため無効";
      } else {
        replyAllBtn.style.opacity = "";
        replyAllBtn.style.pointerEvents = "";
        replyAllBtn.title = "To " + allTo.length + "名 / Cc " + allCc.length + "名";
      }
    } catch (e) {
      document.getElementById("modal-body").innerHTML = '<div class="error">取得失敗: ' + escapeHtml(e.message || "") + '</div>';
    }
  }

  async function classifyAll(threads) {
    const todo = [];
    threads.forEach((t) => {
      if (t._kind && t._kind !== "loading" && t._summary !== undefined && t._displayName !== undefined) return;
      const cached = kindCache[t.id];
      if (cached && cached.summary !== undefined) {
        t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
        return;
      }
      const r = ruleClassify(t);
      if (r && r.kind === "ad") {
        t._kind = "ad"; t._summary = null; t._displayName = null;
        kindCache[t.id] = { kind: "ad", summary: null, displayName: null };
        return;
      }
      todo.push(t);
    });
    if (todo.length > 0) {
      // 野村宛(要約付き)と それ以外(kindのみ)に分ける → トークン節約
      const nomuraTodo = todo.filter(t => startsWithNomura(t));
      const otherTodo = todo.filter(t => !startsWithNomura(t));

      const processBatches = async (list, fn) => {
        const batches = [];
        for (let i = 0; i < list.length; i += 10) batches.push(list.slice(i, i + 10));
        const CONCURRENCY = 3;
        for (let i = 0; i < batches.length; i += CONCURRENCY) {
          const wave = batches.slice(i, i + CONCURRENCY);
          await Promise.all(wave.map(async (batch) => {
            const aiResult = await fn(batch);
            batch.forEach((t, j) => {
              const r = aiResult[j] || {};
              t._kind = r.kind || "info";
              t._summary = r.summary || null;
              t._displayName = r.displayName || null;
              kindCache[t.id] = { kind: t._kind, summary: t._summary, displayName: t._displayName };
            });
          }));
          renderColumns();
        }
      };

      // 並列で両系統を実行
      await Promise.all([
        processBatches(nomuraTodo, aiClassifyBatch),     // 野村宛: 要約付き
        processBatches(otherTodo, aiClassifyKindOnly),   // 他: kindのみ
      ]);
    }
    const keys = Object.keys(kindCache);
    if (keys.length > 1500) {
      const trimmed = {};
      keys.slice(-1500).forEach(k => { trimmed[k] = kindCache[k]; });
      kindCache = trimmed;
    }
    localStorage.setItem(KIND_CACHE_KEY, JSON.stringify(kindCache));
  }

  async function fetchPages(query, pages, pageToken) {
    let allThreads = [];
    let token = pageToken || null;
    for (let p = 0; p < pages; p++) {
      const args = { query: query, pageSize: 50 };
      if (token) args.pageToken = token;
      try {
        const rawResult = await window.cowork.callMcpTool(SEARCH_TOOL, args);
        const data = parseResult(rawResult);
        const threads = (data && data.threads) || [];
        allThreads = allThreads.concat(threads);
        token = (data && data.nextPageToken) || null;
        if (!token) break;
      } catch (e) {
        return { threads: allThreads, nextToken: token, error: e.message };
      }
    }
    return { threads: allThreads, nextToken: token };
  }

  async function loadInitial(sectionKey, query) {
    const s = state[sectionKey];
    s.query = query;
    s.threads = [];
    s.nextToken = null;
    s.count.textContent = "—";

    const { threads, nextToken, error } = await fetchPages(query, INITIAL_PAGES, null);
    if (error) {
      s.count.textContent = "!";
      return [];
    }
    const filterFn = s.exactCheck === "to" ? isExactlyToMe : isExactlyCcMe;
    // 10日以内＋to/cc厳密フィルタ
    const filtered = threads.filter(t => filterFn(t) && isWithin10Days(t));
    s.threads = filtered;
    s.nextToken = nextToken;
    filtered.forEach(t => {
      const cached = kindCache[t.id];
      if (cached && cached.summary !== undefined) {
        t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
      } else t._kind = "loading";
    });
    renderColumns();

    await classifyAll(filtered);
    renderColumns();

    // バックグラウンドで送信者名学習（待たない）
    learnSenderNames(filtered).then(() => renderColumns()).catch(()=>{});
    return filtered;
  }

  // 日付揃えグリッド：4カラム（野村宛・NRSから・To・Cc）を同じ日付ヘッダーで横一線
  // 優先度: 野村宛 > NRSから > To > Cc （重複は左優先）
  function renderColumns() {
    // 野村宛 を to+cc から抽出
    const nomuraMap = new Map();
    (state.to.threads || []).forEach(t => { if (startsWithNomura(t)) nomuraMap.set(t.id, t); });
    (state.cc.threads || []).forEach(t => { if (startsWithNomura(t)) nomuraMap.set(t.id, t); });
    const nomuraThreads = Array.from(nomuraMap.values()).sort((a, b) => {
      const da = lastMessageOf(a).date || "";
      const db = lastMessageOf(b).date || "";
      return String(db).localeCompare(String(da));
    });
    state.nomura.threads = nomuraThreads;

    // NRSから を to+cc から抽出（野村宛は除く）
    const nrsMap = new Map();
    (state.to.threads || []).forEach(t => { if (!nomuraMap.has(t.id) && isFromNrs(t)) nrsMap.set(t.id, t); });
    (state.cc.threads || []).forEach(t => { if (!nomuraMap.has(t.id) && isFromNrs(t)) nrsMap.set(t.id, t); });
    const nrsThreads = Array.from(nrsMap.values()).sort((a, b) => {
      const da = lastMessageOf(a).date || "";
      const db = lastMessageOf(b).date || "";
      return String(db).localeCompare(String(da));
    });
    state.nrs.threads = nrsThreads;

    const toFiltered = (state.to.threads || []).filter(t => !nomuraMap.has(t.id) && !nrsMap.has(t.id));
    const ccFiltered = (state.cc.threads || []).filter(t => !nomuraMap.has(t.id) && !nrsMap.has(t.id));

    // カラム件数表示更新
    const visibleCount = (arr) => arr.filter(t => !(hideAds && t._kind === "ad")).length;
    if (state.nomura.count) state.nomura.count.textContent = visibleCount(nomuraThreads);
    if (state.nrs.count) state.nrs.count.textContent = visibleCount(nrsThreads);
    if (state.to.count) state.to.count.textContent = visibleCount(toFiltered) + (state.to.nextToken ? "+" : "");
    if (state.cc.count) state.cc.count.textContent = visibleCount(ccFiltered) + (state.cc.nextToken ? "+" : "");

    // 日付ごとにグルーピング
    const dateMap = {};
    function addToGroup(thread, col) {
      const last = lastMessageOf(thread);
      const key = dateGroupKey(last.date);
      if (!dateMap[key]) dateMap[key] = { nomura: [], nrs: [], to: [], cc: [], anyDate: last.date };
      dateMap[key][col].push(thread);
    }
    nomuraThreads.forEach(t => addToGroup(t, "nomura"));
    nrsThreads.forEach(t => addToGroup(t, "nrs"));
    toFiltered.forEach(t => addToGroup(t, "to"));
    ccFiltered.forEach(t => addToGroup(t, "cc"));

    const sortedKeys = Object.keys(dateMap).sort((a, b) => b.localeCompare(a));

    const grid = document.getElementById("mail-grid");
    if (!grid) return;
    Array.from(grid.children).forEach(c => {
      if (!c.classList.contains("col-head")) c.remove();
    });

    if (sortedKeys.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.style.gridColumn = "1 / -1";
      empty.textContent = "該当メールはありません";
      grid.appendChild(empty);
      return;
    }

    const allThreads = [];
    function addItemsToCell(cellEl, threadList, kindCls, isLongSummary) {
      if (kindCls) cellEl.classList.add(kindCls);
      if (threadList.length === 0) {
        cellEl.classList.add("empty-cell");
        cellEl.innerHTML = "—";
        return;
      }
      const html = threadList.map((t) => {
        const startIdx = allThreads.length;
        allThreads.push(t);
        return renderItemHtml(t, startIdx, isLongSummary);
      }).join("");
      cellEl.innerHTML = html;
    }

    sortedKeys.forEach(k => {
      const g = dateMap[k];
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(g.anyDate); const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const diffDays = Math.round((today - target) / 86400000);
      const cls = diffDays === 0 ? "today" : diffDays === 1 ? "yesterday" : "";

      const totalCount = g.nomura.length + g.nrs.length + g.to.length + g.cc.length;
      const dateRow = document.createElement("div");
      dateRow.className = "date-row " + cls;
      dateRow.innerHTML = '<span class="date-label">' + escapeHtml(dateGroupLabel(g.anyDate)) + '</span>'
        + '<span class="date-meta">' + totalCount + '件</span>';
      grid.appendChild(dateRow);

      const nomuraCell = document.createElement("div"); nomuraCell.className = "cell";
      const toCell = document.createElement("div"); toCell.className = "cell";
      const ccCell = document.createElement("div"); ccCell.className = "cell";
      const nrsCell = document.createElement("div"); nrsCell.className = "cell";
      addItemsToCell(nomuraCell, g.nomura, "priority", true);  // 野村宛は長い要約
      addItemsToCell(toCell, g.to, null, false);
      addItemsToCell(ccCell, g.cc, null, false);
      addItemsToCell(nrsCell, g.nrs, "nrs", false);
      grid.appendChild(nomuraCell);
      grid.appendChild(toCell);
      grid.appendChild(ccCell);
      grid.appendChild(nrsCell);
    });

    grid.querySelectorAll(".item").forEach(el => {
      const idx = parseInt(el.dataset.threadIdx, 10);
      el.addEventListener("click", (e) => {
        if (e.target.classList.contains("edit-name-btn")) return;
        openThread(allThreads[idx]);
      });
    });
    grid.querySelectorAll(".edit-name-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        openNameEditPopover(btn.dataset.email, btn);
      });
    });

    const hasMore = state.to.nextToken || state.cc.nextToken;
    if (hasMore) {
      const moreBtn = document.createElement("button");
      moreBtn.className = "more-btn";
      moreBtn.style.gridColumn = "1 / -1";
      moreBtn.textContent = "↓ 過去のメールを読み込む";
      moreBtn.addEventListener("click", async () => {
        moreBtn.disabled = true;
        moreBtn.textContent = "↻ 読み込み中…";
        if (state.to.nextToken) await loadMore("to");
        if (state.cc.nextToken) await loadMore("cc");
      });
      grid.appendChild(moreBtn);
    }
  }

  // 本文full取得して完全URLを抽出するバックグラウンド処理
  // snippet段階で「dropbox」等のキーワードが見つかったメールだけ対象
  async function loadFullFileLinks(threads) {
    const FILE_KEYWORDS = /dropbox|gigafile|wetransfer|drive\.google|docs\.google|firestorage|box\.com|we\.tl|db\.tt/i;
    const todo = threads.filter(t => {
      if (fileLinksCache[t.id] !== undefined) return false; // キャッシュ済
      const last = (t.messages || [])[(t.messages || []).length - 1] || {};
      return FILE_KEYWORDS.test(last.snippet || "");
    }).slice(0, 15); // 最大15件/refresh
    if (todo.length === 0) return;

    for (let i = 0; i < todo.length; i += 8) {
      const batch = todo.slice(i, i + 8);
      await Promise.all(batch.map(async (t) => {
        try {
          const result = await window.cowork.callMcpTool(GET_THREAD_TOOL, {
            threadId: t.id, messageFormat: "FULL_CONTENT"
          });
          const data = parseResult(result);
          const messages = (data && data.messages) || [];
          let combined = "";
          messages.forEach(msg => { combined += " " + (msg.body || msg.snippet || ""); });
          // HTML エンティティ復号も軽くやる
          combined = combined.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
          fileLinksCache[t.id] = extractFileLinks(combined);
        } catch(e) {
          fileLinksCache[t.id] = [];
        }
      }));
      try { localStorage.setItem(FILE_LINKS_CACHE_KEY, JSON.stringify(fileLinksCache)); } catch(e) {}
      renderColumns();
    }
  }

  // 重要キーワードのハイライト処理（正規表現のみ、AI不使用）
  // 「野村」「日付」「締切/期限」を視覚的に目立たせる
  function highlightText(text) {
    if (!text) return "";
    let html = escapeHtml(text);
    // 1. 締切系の強い注意キーワード（最優先で目立たせる）
    html = html.replace(
      /(締切|締め切り|〆切り?|納期|期限|デッドライン|至急|大至急|要返信|要対応|要確認|today|asap|urgent)/gi,
      '<span class="hl-deadline">$1</span>'
    );
    // 2. 野村の名前（敬称含む）
    html = html.replace(
      /(野村(?:様|さま|さん|殿|くん|君|氏|裕紀|ひろのり|ヒロノリ|ヒロ)?)/g,
      '<span class="hl-name">$1</span>'
    );
    // 3. 相対日付
    html = html.replace(
      /(明日|本日|今日|明後日|あさって|今週中|今月中|来週中|来月中|今日中|本日中|明日中|月末|来月末|月初)(?:まで|までに|に|中)?/g,
      '<span class="hl-date">$&</span>'
    );
    // 4. 絶対日付：M月D日, M/D, MM/DD（日付らしいパターン）
    html = html.replace(
      /(\d{1,2}\s*[月\/\-]\s*\d{1,2}(?:\s*日)?(?:[(（]?[月火水木金土日][)）]?)?)/g,
      '<span class="hl-date">$1</span>'
    );
    // 5. 時刻付き日付（例：5/3 18:00, 5月3日13時）
    html = html.replace(
      /(\d{1,2}[:時]\d{0,2}分?)/g,
      '<span class="hl-date">$1</span>'
    );
    return html;
  }

  // ファイル共有リンク抽出（Dropbox / Google Drive / WeTransfer / ギガファイル便 等）
  function extractFileLinks(snippet) {
    if (!snippet) return [];
    const text = String(snippet);
    const patterns = [
      { re: /https?:\/\/(?:www\.)?dropbox\.com\/[^\s<>"')]+/gi, label: "Dropbox", icon: "📦" },
      { re: /https?:\/\/dl\.dropboxusercontent\.com\/[^\s<>"')]+/gi, label: "Dropbox", icon: "📦" },
      { re: /https?:\/\/(?:www\.)?db\.tt\/[^\s<>"')]+/gi, label: "Dropbox", icon: "📦" },
      { re: /https?:\/\/drive\.google\.com\/[^\s<>"')]+/gi, label: "Google Drive", icon: "📁" },
      { re: /https?:\/\/docs\.google\.com\/[^\s<>"')]+/gi, label: "Google Docs", icon: "📄" },
      { re: /https?:\/\/(?:www\.)?wetransfer\.com\/[^\s<>"')]+/gi, label: "WeTransfer", icon: "🚀" },
      { re: /https?:\/\/we\.tl\/[^\s<>"')]+/gi, label: "WeTransfer", icon: "🚀" },
      { re: /https?:\/\/(?:[\w-]+\.)?gigafile\.nu\/[^\s<>"')]+/gi, label: "ギガファイル", icon: "📦" },
      { re: /https?:\/\/firestorage\.jp\/[^\s<>"')]+/gi, label: "Firestorage", icon: "📦" },
      { re: /https?:\/\/(?:www\.)?box\.com\/[^\s<>"')]+/gi, label: "Box", icon: "📁" },
      { re: /https?:\/\/[\w-]+\.box\.com\/[^\s<>"')]+/gi, label: "Box", icon: "📁" },
    ];
    const found = [];
    const seen = new Set();
    patterns.forEach(p => {
      const matches = text.match(p.re);
      if (matches) {
        matches.forEach(url => {
          // 末尾の不要文字（句読点等）削除
          const cleaned = url.replace(/[.,;:!?'"」）)】>]+$/, "");
          if (!seen.has(cleaned)) {
            seen.add(cleaned);
            found.push({ url: cleaned, label: p.label, icon: p.icon });
          }
        });
      }
    });
    return found;
  }

  // 個別アイテムのHTMLを生成
  // isLongSummary: true なら要約全文（80字程度）、false なら短く（30字でカット）
  function renderItemHtml(t, idx, isLongSummary) {
    const msgs = t.messages || [];
    const last = lastMessageOf(t);
    const threadCount = msgs.length;
    const kind = t._kind || "loading";
    const hidden = hideAds && kind === "ad" ? ' style="display:none"' : '';
    let summaryHtml;
    if (kind === "ad") {
      summaryHtml = '';
    } else if (isLongSummary) {
      // 野村宛：AI要約があれば長文表示、なければ snippet
      if (t._summary) {
        summaryHtml = '<div class="summary long">' + escapeHtml(t._summary) + '</div>';
      } else {
        summaryHtml = '<div class="summary placeholder">' + escapeHtml((last.snippet || "").slice(0, 200)) + '</div>';
      }
    } else {
      // 他カラム：常に原文 snippet を3行で表示（AI要約は使わない）
      summaryHtml = '<div class="summary snippet-3line">' + escapeHtml((last.snippet || "").slice(0, 240)) + '</div>';
    }
    const senderEmailStr = senderEmail(last.sender);
    const hasAtt = state.attachmentIds.has(t.id);
    const attIcon = hasAtt ? '<span class="att-icon" title="添付ファイルあり">📎</span>' : '';

    // 野村宛(isLongSummary)：添付ファイル個数を表示（Gmail MCPはファイル名を返さないため個数のみ）
    let attDetailHtml = '';
    if (isLongSummary) {
      const dets = t._attachmentDetails;
      if (dets && dets.length > 0 && dets[0].count) {
        attDetailHtml = '<div class="att-inline"><span class="att-name-only">📎 添付ファイル ' + dets[0].count + ' 個</span></div>';
      } else if (dets === undefined && hasAtt) {
        attDetailHtml = '<div class="att-inline loading">📎 添付情報取得中…</div>';
      }
    }

    // ファイル共有リンク（Dropbox等）：完全URLキャッシュ優先、なければsnippetから（途切れる可能性あり）
    let fileLinks;
    if (fileLinksCache[t.id] !== undefined) {
      fileLinks = fileLinksCache[t.id];
    } else {
      fileLinks = extractFileLinks(last.snippet || "");
    }
    let fileLinksHtml = '';
    if (fileLinks && fileLinks.length > 0) {
      fileLinksHtml = '<div class="file-links">' + fileLinks.map(fl =>
        '<a class="file-link" href="' + escapeHtml(fl.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="' + escapeHtml(fl.url) + '">' +
          '<span class="fl-icon">' + fl.icon + '</span>' +
          '<span class="fl-text">' + escapeHtml(fl.label) + ': ' + escapeHtml(fl.url) + '</span>' +
        '</a>'
      ).join("") + '</div>';
    }

    return '<div class="item kind-' + kind + '" data-thread-idx="' + idx + '"' + hidden + '>' +
      '<div class="row1">' +
        '<div class="row1-left">' +
          '<span class="dot ' + kind + '"></span>' +
          '<span class="sender">' + escapeHtml(displayNameOf(t)) + '</span>' +
          '<button class="edit-name-btn" data-email="' + escapeHtml(senderEmailStr) + '" title="送信者名を編集">✎</button>' +
          (threadCount > 1 ? '<span class="badge">' + threadCount + '</span>' : '') +
          attIcon +
        '</div>' +
        '<span class="date">' + escapeHtml(fmtDate(last.date)) + '</span>' +
      '</div>' +
      '<div class="subject">' + escapeHtml(decodeMimeWord(last.subject || "") || "(件名なし)") + '</div>' +
      summaryHtml +
      fileLinksHtml +
      attDetailHtml +
    '</div>';
  }

  async function loadMore(sectionKey) {
    const s = state[sectionKey];
    if (!s.nextToken) return;

    const { threads, nextToken, error } = await fetchPages(s.query, MORE_PAGES, s.nextToken);
    if (error) return;
    const filterFn = s.exactCheck === "to" ? isExactlyToMe : isExactlyCcMe;
    const filtered = threads.filter(t => filterFn(t) && isWithin10Days(t));
    s.threads = s.threads.concat(filtered);
    s.nextToken = nextToken;
    s.threads.forEach(t => {
      if (!t._kind) {
        const cached = kindCache[t.id];
        if (cached && cached.summary !== undefined) {
          t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
        } else t._kind = "loading";
      }
    });
    renderColumns();

    await classifyAll(s.threads);
    renderColumns();
    learnSenderNames(filtered).then(() => renderColumns()).catch(()=>{});
  }

  async function refresh() {
    const unreadFilter = currentFilter === "unread" ? " is:unread" : "";
    const dateFilter = " newer_than:10d"; // 過去10日間に絞る
    const toQuery = "to:" + ME + dateFilter + unreadFilter;
    const ccQuery = "cc:" + ME + dateFilter + unreadFilter;

    state.nomura.count = document.getElementById("count-nomura");
    state.nrs.count = document.getElementById("count-nrs");
    state.to.count = document.getElementById("count-to");
    state.cc.count = document.getElementById("count-cc");

    document.getElementById("stats").textContent = "読み込み中…";
    state.attachmentIds = new Set();
    await Promise.all([
      loadInitial("to", toQuery),
      loadInitial("cc", ccQuery),
      loadAttachmentIds(),
    ]);
    renderColumns();

    // バックグラウンド処理（待たない）
    const allThreads = [...state.to.threads, ...state.cc.threads];
    // 1. Dropbox等のファイル共有リンク完全URL取得
    loadFullFileLinks(allThreads).then(() => renderColumns()).catch(()=>{});
    // 2. 野村宛の添付ファイル名取得
    loadAttachmentDetailsForNomura(state.nomura.threads).then(() => renderColumns()).catch(()=>{});
    const nomuraCount = state.nomura.threads.length;
    const nrsCount = state.nrs.threads.length;
    const nomuraReply = state.nomura.threads.filter(t => t._kind === "reply").length;
    document.getElementById("stats").innerHTML =
      '★野村宛 <strong>' + nomuraCount + '</strong> · 要返信 <strong>' + nomuraReply + '</strong>　/　' +
      'NRS <strong>' + nrsCount + '</strong>';
  }

  function setFilter(f) {
    currentFilter = f;
    localStorage.setItem(STORE_KEY, f);
    document.getElementById("filter-unread").classList.toggle("active", f === "unread");
    document.getElementById("filter-all").classList.toggle("active", f === "all");
    refresh();
  }

  document.getElementById("filter-unread").addEventListener("click", () => setFilter("unread"));
  document.getElementById("filter-all").addEventListener("click", () => setFilter("all"));
  document.getElementById("hide-ads").addEventListener("change", (e) => {
    hideAds = e.target.checked;
    localStorage.setItem(HIDE_KEY, hideAds ? "1" : "0");
    renderColumns();
  });

  refresh();
})();
</script>
</body>
</html>
