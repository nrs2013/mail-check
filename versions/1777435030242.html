<!doctype html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Mail Triage Dashboard",
  "schemaVersion": 1,
  "description": "のむさん用：To自分/CC自分の未読メールを一覧表示するダッシュボード。Gmail検索で取得、クリックでGmailで開く",
  "mcpTools": [
    "mcp__19563f62-bf66-428a-a54d-aa5a0c40fba3__search_threads"
  ],
  "mcpServerNames": [
    "Gmail"
  ]
}
</script>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>📬 メール仕分けダッシュボード</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", system-ui, sans-serif;
    background: #fafafa; color: #222; margin: 0; padding: 16px;
    font-size: 14px; line-height: 1.5;
  }
  h1 { font-size: 18px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .sub { color: #666; font-size: 12px; margin-bottom: 16px; }
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) { .columns { grid-template-columns: 1fr; } }
  .col { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; overflow: hidden; }
  .col-head {
    padding: 10px 14px; font-weight: 600; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #eee;
  }
  .col-head.to { background: #fef2f2; color: #b91c1c; }
  .col-head.cc { background: #eff6ff; color: #1d4ed8; }
  .count { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: rgba(0,0,0,.08); }
  .list { max-height: 78vh; overflow-y: auto; }
  .item { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .12s; position: relative; }
  .item:hover { background: #f8fafc; }
  .item:last-child { border-bottom: 0; }
  .item.kind-ad { opacity: 0.45; }
  .item.kind-ad .subject, .item.kind-ad .sender { font-weight: 400; }
  .item.kind-reply { background: #fffbf0; }
  .item.kind-reply:hover { background: #fff7e0; }
  .row1 { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .sender { font-weight: 600; color: #111; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
  .meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .date { font-size: 11px; color: #888; }
  .subject { font-size: 13px; color: #333; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .snippet { font-size: 12px; color: #777; margin-top: 4px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; vertical-align: middle; line-height: 1.4; }
  .badge.thread { background: #e5e7eb; color: #374151; margin-right: 4px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; line-height: 1.4; flex-shrink: 0; }
  .tag-reply { background: #fee2e2; color: #b91c1c; }
  .tag-info { background: #fef3c7; color: #b45309; }
  .tag-ad { background: #e5e7eb; color: #6b7280; }
  .tag-loading { background: #dbeafe; color: #1e40af; }
  .empty { padding: 24px; text-align: center; color: #888; font-size: 13px; }
  .loading { padding: 24px; text-align: center; color: #888; font-size: 13px; }
  .error { padding: 12px; background: #fef2f2; color: #b91c1c; border-radius: 6px; font-size: 11px; word-break: break-all; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toggle { display: inline-flex; gap: 4px; background: #f3f4f6; border-radius: 8px; padding: 2px; }
  .toggle button { background: transparent; border: 0; padding: 4px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; color: #555; }
  .toggle button.active { background: #fff; color: #111; box-shadow: 0 1px 2px rgba(0,0,0,.1); font-weight: 600; }
  .stats { font-size: 12px; color: #666; }
  .stats strong { color: #111; }
  .switch { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; user-select: none; }
  .switch input { margin: 0; }
  .ai-hint { font-size: 11px; color: #888; }
</style>
</head>
<body>
  <h1>📬 メール仕分けダッシュボード</h1>
  <div class="sub">nomura@nrs1.jp に届いたメールを自動分類。🔴要返信 / 🟡情報共有 / ⚫広告はAI判定。</div>

  <div class="controls">
    <div class="toggle">
      <button id="filter-unread" class="active">未読のみ</button>
      <button id="filter-all">すべて</button>
    </div>
    <label class="switch"><input type="checkbox" id="hide-ads" checked /> 広告/通知を非表示</label>
    <div class="stats" id="stats">読み込み中...</div>
  </div>

  <div class="columns">
    <div class="col">
      <div class="col-head to">
        <span>📩 To自分</span>
        <span class="count" id="count-to">-</span>
      </div>
      <div class="list" id="list-to"><div class="loading">読み込み中…</div></div>
    </div>
    <div class="col">
      <div class="col-head cc">
        <span>📋 CC自分</span>
        <span class="count" id="count-cc">-</span>
      </div>
      <div class="list" id="list-cc"><div class="loading">読み込み中…</div></div>
    </div>
  </div>

<script>
(function() {
  const SEARCH_TOOL = "mcp__19563f62-bf66-428a-a54d-aa5a0c40fba3__search_threads";
  const STORE_KEY = "mailDashFilter_v3";
  const HIDE_KEY = "mailDashHideAds_v3";
  const KIND_CACHE_KEY = "mailDashKindCache_v3";
  const ME = "nomura@nrs1.jp";

  let currentFilter = localStorage.getItem(STORE_KEY) || "unread";
  let hideAds = localStorage.getItem(HIDE_KEY) !== "0";
  let kindCache = {};
  try { kindCache = JSON.parse(localStorage.getItem(KIND_CACHE_KEY) || "{}"); } catch(e) {}

  document.getElementById("filter-" + currentFilter).classList.add("active");
  document.getElementById("filter-" + (currentFilter === "unread" ? "all" : "unread")).classList.remove("active");
  document.getElementById("hide-ads").checked = hideAds;

  function escapeHtml(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const now = new Date();
    const diffH = (now - d) / 36e5;
    if (diffH < 24) return d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    if (diffH < 24 * 7) return d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
    return d.toLocaleDateString("ja-JP", { year: "2-digit", month: "numeric", day: "numeric" });
  }

  function senderName(s) {
    if (!s) return "(不明)";
    const m = s.match(/^"?([^"<]+?)"?\s*<.+>$/);
    if (m) return m[1].trim();
    if (s.includes("@")) return s.split("@")[0];
    return s;
  }
  function senderEmail(s) {
    if (!s) return "";
    const m = s.match(/<([^>]+)>/);
    if (m) return m[1].toLowerCase();
    return s.toLowerCase();
  }
  function senderDomain(s) {
    const e = senderEmail(s);
    const at = e.lastIndexOf("@");
    return at >= 0 ? e.slice(at + 1) : "";
  }

  function parseResult(result) {
    if (!result) return null;
    if (typeof result === "string") {
      try { return JSON.parse(result); } catch (e) { return { _raw: result }; }
    }
    if (result.content && Array.isArray(result.content)) {
      const textPart = result.content.find(c => c.type === "text");
      if (textPart && textPart.text) {
        try { return JSON.parse(textPart.text); } catch (e) { return { _raw: textPart.text }; }
      }
    }
    if (result.result) return parseResult(result.result);
    return result;
  }

  // ルールベース判定（速い）
  // return: "ad" / "info" / "reply" / null（=AI判定にまわす）
  function ruleClassify(thread) {
    const msgs = thread.messages || [];
    const last = msgs[msgs.length - 1] || {};
    const sender = (last.sender || "").toLowerCase();
    const email = senderEmail(last.sender);
    const domain = senderDomain(last.sender);
    const subj = (last.subject || "").toLowerCase();
    const snip = (last.snippet || "").toLowerCase();

    // 明らかな広告/通知ドメイン
    const adDomains = [
      "rakuten.co.jp", "rakuten.com", "rakuten-card.co.jp", "mail.rakuten.com",
      "pinterest.com", "mail.instagram.com", "mailer.x.com", "x.com", "twitter.com",
      "amazon.co.jp", "amazon.com", "amazonses.com",
      "kickstarterhot.com", "shutterstock.com",
      "ocn.ne.jp", "paypay.ne.jp", "paypay-card.co.jp", "mail.paypay.ne.jp",
      "facebookmail.com", "linkedin.com", "stripe.com",
      "switchbot.cn", "switch-bot.com",
      "didi-mobility.com", "ディディ", "switchbot",
      "pvot-apparel.com", "manashop.com",
      "google.com", "noreply.google.com", "accounts.google.com", "calendar-server.bounces.google.com",
      "dropboxmail.com", "no-reply.dropbox.com", "dropbox.com",
      "airbnb.com", "airbnbmail.com",
      "info.dlmarket.jp",
    ];
    if (adDomains.some(d => domain === d || domain.endsWith("." + d))) return "ad";

    // noreply / no-reply 系
    if (/^(no-?reply|noreply|info|news|notice|notification|alert|auto-confirm|order|donotreply|do-not-reply|mailer)@/.test(email)) {
      return "ad";
    }

    // 件名キーワードで広告
    const adKeywords = ["セール", "キャンペーン", "クーポン", "お知らせ", "新商品", "ポイント", "更新", "本日限定", "限定", "プレゼント", "オフ", "%off", "off!", "newsletter", "限り", "メルマガ", "発売", "sale", "special offer", "discount", "ご注文の確認", "発送のお知らせ", "お届け", "invoice", "payment status", "verify your"];
    if (adKeywords.some(k => subj.includes(k))) return "ad";

    // 件名で「Re:」「Fw:」が付いてて、人間ぽいドメイン → 要返信候補
    if (/^(re:|fw:|fwd:)/i.test(last.subject || "") && !email.includes("noreply")) {
      // ただし無関係なドメインは除外
      return "reply";
    }

    return null; // AI判定行き
  }

  // Claude Haiku に複数メールまとめて判定させる
  async function aiClassifyBatch(threads) {
    const items = threads.map((t, i) => {
      const last = (t.messages || [])[(t.messages || []).length - 1] || {};
      return {
        idx: i,
        from: last.sender,
        subject: last.subject,
        snippet: (last.snippet || "").slice(0, 200),
      };
    });
    const prompt = `あなたはメール仕分けアシスタントです。以下のメール一覧をそれぞれ次のいずれかに分類してください：
- "reply": 仕事関係で返信や対応が必要なメール（具体的な依頼、相談、確認、図面・資料のやり取りなど）
- "info": 情報共有メール（FYI、進捗報告、議事録など。返信不要だが内容は確認すべき）
- "ad": 広告、自動通知、ニュースレター、配送通知、SNS通知、キャンペーンなど（人間が返信する必要がない）

返答は次のJSON配列のみで返してください。説明文は一切不要です:
[{"idx":0,"kind":"reply"},{"idx":1,"kind":"ad"},...]`;
    try {
      const result = await window.cowork.askClaude(prompt, items);
      let text = result;
      if (typeof result === "object") {
        if (result.content && Array.isArray(result.content)) {
          const t = result.content.find(c => c.type === "text");
          text = t ? t.text : JSON.stringify(result);
        } else if (result.text) text = result.text;
        else text = JSON.stringify(result);
      }
      // JSON配列を抜き出す
      const m = text.match(/\[[\s\S]*\]/);
      if (!m) return {};
      const parsed = JSON.parse(m[0]);
      const out = {};
      parsed.forEach(p => { out[p.idx] = p.kind; });
      return out;
    } catch (e) {
      console.error("AI classify failed", e);
      return {};
    }
  }

  function kindLabel(k) {
    if (k === "reply") return '<span class="tag tag-reply">🔴 要返信</span>';
    if (k === "info") return '<span class="tag tag-info">🟡 情報</span>';
    if (k === "ad") return '<span class="tag tag-ad">⚫ 広告</span>';
    return '<span class="tag tag-loading">判定中</span>';
  }

  function renderItems(threads, container) {
    if (!threads || threads.length === 0) {
      container.innerHTML = '<div class="empty">該当メールはありません 🎉</div>';
      return;
    }
    const html = threads.map(t => {
      const msgs = t.messages || [];
      const last = msgs[msgs.length - 1] || {};
      const threadCount = msgs.length;
      const url = "https://mail.google.com/mail/u/0/#inbox/" + t.id;
      const kind = t._kind || "loading";
      const hidden = hideAds && kind === "ad" ? ' style="display:none"' : '';
      return '<div class="item kind-' + kind + '" data-url="' + url + '" data-id="' + t.id + '"' + hidden + '>' +
        '<div class="row1">' +
          '<div class="sender">' + escapeHtml(senderName(last.sender)) + '</div>' +
          '<div class="meta">' + kindLabel(kind) + '<span class="date">' + escapeHtml(fmtDate(last.date)) + '</span></div>' +
        '</div>' +
        '<div class="subject">' + (threadCount > 1 ? '<span class="badge thread">' + threadCount + '</span>' : '') + escapeHtml(last.subject || "(件名なし)") + '</div>' +
        '<div class="snippet">' + escapeHtml((last.snippet || "").slice(0, 200)) + '</div>' +
      '</div>';
    }).join("");
    container.innerHTML = html;
    container.querySelectorAll(".item").forEach(el => {
      el.addEventListener("click", () => window.open(el.dataset.url, "_blank"));
    });
  }

  function applyHideAds(container) {
    container.querySelectorAll(".item.kind-ad").forEach(el => {
      el.style.display = hideAds ? "none" : "";
    });
  }

  async function classifyAll(threads) {
    // ステップ1: ルールベースで分類できるものは即決
    const todo = [];
    threads.forEach((t, i) => {
      // キャッシュ確認
      if (kindCache[t.id]) {
        t._kind = kindCache[t.id];
        return;
      }
      const k = ruleClassify(t);
      if (k) {
        t._kind = k;
        kindCache[t.id] = k;
      } else {
        todo.push({ thread: t, originalIdx: i });
      }
    });

    // ステップ2: 残りをAIに判定させる（バッチで）
    if (todo.length > 0) {
      const aiThreads = todo.map(x => x.thread);
      const aiResult = await aiClassifyBatch(aiThreads);
      todo.forEach((x, i) => {
        const k = aiResult[i] || "info"; // 不明なら info にフォールバック
        x.thread._kind = k;
        kindCache[x.thread.id] = k;
      });
    }

    // キャッシュ保存（最大1000件）
    const keys = Object.keys(kindCache);
    if (keys.length > 1000) {
      const trimmed = {};
      keys.slice(-1000).forEach(k => { trimmed[k] = kindCache[k]; });
      kindCache = trimmed;
    }
    localStorage.setItem(KIND_CACHE_KEY, JSON.stringify(kindCache));
  }

  async function fetchSection(query, listEl, countEl) {
    try {
      const rawResult = await window.cowork.callMcpTool(SEARCH_TOOL, { query: query, pageSize: 50 });
      const data = parseResult(rawResult);
      const threads = (data && data.threads) || [];

      // 一旦「判定中」で描画
      threads.forEach(t => { t._kind = kindCache[t.id] || "loading"; });
      renderItems(threads, listEl);
      countEl.textContent = threads.length + (data && data.nextPageToken ? "+" : "");

      // バックグラウンドでAI判定して再描画
      await classifyAll(threads);
      renderItems(threads, listEl);

      return threads;
    } catch (e) {
      listEl.innerHTML = '<div class="error">取得失敗: ' + escapeHtml(e.message || JSON.stringify(e)) + '<br>クエリ: ' + escapeHtml(query) + '</div>';
      countEl.textContent = "!";
      return [];
    }
  }

  async function refresh() {
    const unreadFilter = currentFilter === "unread" ? " is:unread" : "";
    document.getElementById("list-to").innerHTML = '<div class="loading">読み込み中…</div>';
    document.getElementById("list-cc").innerHTML = '<div class="loading">読み込み中…</div>';
    document.getElementById("stats").textContent = "読み込み中...";

    const toQuery = "to:" + ME + unreadFilter;
    const ccQuery = "cc:" + ME + unreadFilter;

    const [toThreads, ccThreads] = await Promise.all([
      fetchSection(toQuery, document.getElementById("list-to"), document.getElementById("count-to")),
      fetchSection(ccQuery, document.getElementById("list-cc"), document.getElementById("count-cc")),
    ]);

    const toReply = toThreads.filter(t => t._kind === "reply").length;
    const ccReply = ccThreads.filter(t => t._kind === "reply").length;
    document.getElementById("stats").innerHTML =
      '<strong>To: ' + toThreads.length + '件</strong>(うち🔴' + toReply + ')　・　' +
      '<strong>CC: ' + ccThreads.length + '件</strong>(うち🔴' + ccReply + ')　' +
      (currentFilter === "unread" ? "(未読のみ)" : "(全件・最新50)");
  }

  function setFilter(f) {
    currentFilter = f;
    localStorage.setItem(STORE_KEY, f);
    document.getElementById("filter-unread").classList.toggle("active", f === "unread");
    document.getElementById("filter-all").classList.toggle("active", f === "all");
    refresh();
  }

  document.getElementById("filter-unread").addEventListener("click", () => setFilter("unread"));
  document.getElementById("filter-all").addEventListener("click", () => setFilter("all"));
  document.getElementById("hide-ads").addEventListener("change", (e) => {
    hideAds = e.target.checked;
    localStorage.setItem(HIDE_KEY, hideAds ? "1" : "0");
    applyHideAds(document.getElementById("list-to"));
    applyHideAds(document.getElementById("list-cc"));
  });

  refresh();
})();
</script>
</body>
</html>
