<style>

  .toast.error { background: rgba(248,113,113,.12); color: var(--reply); }
</style>

<script>
(function() {
  const SEARCH_TOOL = "mcp__19563f62-bf66-428a-a54d-aa5a0c40fba3__search_threads";
  const GET_THREAD_TOOL = "mcp__19563f62-bf66-428a-a54d-aa5a0c40fba3__get_thread";
  const CREATE_DRAFT_TOOL = "mcp__19563f62-bf66-428a-a54d-aa5a0c40fba3__create_draft";
  const STORE_KEY = "mailDashFilter_v3";
  const HIDE_KEY = "mailDashHideAds_v5";
  const KIND_CACHE_KEY = "mailDashKindCache_v11";
  const ME = "nomura@nrs1.jp";
  const INITIAL_PAGES = 4;
  const MORE_PAGES = 4;

  let currentFilter = localStorage.getItem(STORE_KEY) || "unread";
  let hideAds = localStorage.getItem(HIDE_KEY) !== "0";
  let kindCache = {};
  try { kindCache = JSON.parse(localStorage.getItem(KIND_CACHE_KEY) || "{}"); } catch(e) {}

  const state = {
    to: { threads: [], nextToken: null, query: "", el: null, btn: null, count: null, exactCheck: "to" },
    cc: { threads: [], nextToken: null, query: "", el: null, btn: null, count: null, exactCheck: "cc" },
    currentThread: null,
  };

  document.getElementById("filter-" + currentFilter).classList.add("active");
  document.getElementById("filter-" + (currentFilter === "unread" ? "all" : "unread")).classList.remove("active");
  document.getElementById("hide-ads").checked = hideAds;

  function escapeHtml(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const now = new Date();
    const diffH = (now - d) / 36e5;
    if (diffH < 24) return d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    if (diffH < 24 * 7) return d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" });
    return d.toLocaleDateString("ja-JP", { year: "2-digit", month: "numeric", day: "numeric" });
  }
  function fmtFullDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString("ja-JP");
  }
  function senderName(s) {
    if (!s) return "(不明)";
    const m = s.match(/^"?([^"<]+?)"?\s*<.+>$/);
    if (m) return m[1].trim();
    if (s.includes("@")) return s.split("@")[0];
    return s;
  }
  function senderEmail(s) {
    if (!s) return "";
    const m = s.match(/<([^>]+)>/);
    if (m) return m[1].toLowerCase();
    return s.toLowerCase();
  }
  function senderDomain(s) {
    const e = senderEmail(s);
    const at = e.lastIndexOf("@");
    return at >= 0 ? e.slice(at + 1) : "";
  }
  function hasJapanese(s) { return /[぀-ゟ゠-ヿ一-鿿]/.test(s || ""); }

  function isExactlyToMe(thread) {
    const msgs = thread.messages || [];
    for (const msg of msgs) {
      const tos = (msg.toRecipients || []).map(r => String(r).toLowerCase());
      if (tos.some(t => t === ME || t.includes("<" + ME + ">"))) return true;
    }
    return false;
  }
  function isExactlyCcMe(thread) {
    const msgs = thread.messages || [];
    for (const msg of msgs) {
      const ccs = (msg.ccRecipients || []).map(r => String(r).toLowerCase());
      if (ccs.some(c => c === ME || c.includes("<" + ME + ">"))) return true;
    }
    return false;
  }

  // snippet 本文から日本語名抽出（フルネーム優先）
  function extractJapaneseNameFromSnippet(snippet) {
    if (!snippet) return null;
    const s = String(snippet).slice(0, 500);
    const patterns = [
      /株式会社\s*([一-鿿ぁ-ゖァ-ヺー]{2,12})\s*[\s,、]?\s*([一-鿿]{2,5})/,
      /有限会社\s*([一-鿿ぁ-ゖァ-ヺー]{2,12})\s*[\s,、]?\s*([一-鿿]{2,5})/,
      /([一-鿿ぁ-ゖァ-ヺー]{2,10})\s*の\s*([一-鿿]{2,5})\s*です/,
      /([一-鿿ぁ-ゖァ-ヺー]{2,10})\s*の\s*([一-鿿]{2,5})\s*と申します/,
      /([一-鿿]{2,5})\s*です[。\s,]/,
      /([一-鿿]{2,5})\s*と申します/,
      /([一-鿿]{2,5})\s*より/,
    ];
    for (const p of patterns) {
      const m = s.match(p);
      if (m) {
        if (m[2]) return m[1] + " " + m[2];
        return m[1];
      }
    }
    return null;
  }

  const adNameMap = {
    "amazon.co.jp": "Amazon", "amazon.com": "Amazon", "amazonses.com": "Amazon",
    "rakuten.co.jp": "楽天", "emagazine.rakuten.co.jp": "楽天マイカー割", "mail.rakuten.co.jp": "楽天", "rakuten-card.co.jp": "楽天カード",
    "pinterest.com": "Pinterest", "mail.instagram.com": "Instagram",
    "x.com": "X", "mailer.x.com": "X",
    "kickstarterhot.com": "Kickstarter", "kickstartech.co": "Kickstarter", "shutterstock.com": "Shutterstock",
    "ocn.ne.jp": "OCN", "paypay.ne.jp": "PayPay", "paypay-card.co.jp": "PayPayカード",
    "switchbot.cn": "SwitchBot", "switch-bot.com": "SwitchBot", "switchbot.jp": "SwitchBot",
    "didi-mobility.com": "DiDi", "didiglobal.com": "DiDi", "mkt-jp.didiglobal.com": "DiDi",
    "pvot-apparel.com": "Pvot", "g.shopifyemail.com": "Shopify",
    "pelvini.com": "Pelvini", "ohmforce.com": "Ohm Force", "openai.com": "OpenAI", "email.openai.com": "OpenAI",
    "polisher.jp": "polisherJP", "artlist.io": "Artlist",
    "tokon.co.jp": "トーコン", "basemail.jp": "ALLAUMO", "h-resolution.com": "ハイレゾ", "my-day.shop": "my day",
    "sride.co.jp": "S.RIDE", "microsoftstore.microsoft.com": "Microsoft",
    "acestudio.ai": "ACE Studio", "aejuice.com": "AEJuice", "cloudflare.com": "Cloudflare", "adobe.com": "Adobe",
    "dropboxmail.com": "Dropbox",
  };

  function adDisplayName(senderStr) {
    const domain = senderDomain(senderStr);
    if (!domain) return null;
    if (adNameMap[domain]) return adNameMap[domain];
    for (const k of Object.keys(adNameMap)) {
      if (domain.endsWith("." + k)) return adNameMap[k];
    }
    return null;
  }

  function parseResult(result) {
    if (!result) return null;
    if (typeof result === "string") {
      try { return JSON.parse(result); } catch (e) { return { _raw: result }; }
    }
    if (result.content && Array.isArray(result.content)) {
      const textPart = result.content.find(c => c.type === "text");
      if (textPart && textPart.text) {
        try { return JSON.parse(textPart.text); } catch (e) { return { _raw: textPart.text }; }
      }
    }
    if (result.result) return parseResult(result.result);
    return result;
  }

  // 広告判定すべきメアドのローカル部（@より前）リスト
  const adLocalParts = new Set([
    "noreply", "no-reply", "donotreply", "do-not-reply",
    "info", "info1", "info2", "info3",
    "news", "notice", "notification", "alert", "alerts",
    "auto-confirm", "order-update", "order-confirm",
    "shipment-tracking", "shipment", "tracking", "delivery",
    "mailer", "magazine", "newsletter", "newsletters",
    "email", "emails", "contact", "service", "support", "help",
    "admin", "account", "accounts", "billing", "payment", "payments",
    "update", "updates", "promotion", "promotions", "marketing",
    "customer", "customers", "member", "members", "membership",
    "press", "public", "webmaster",
    "reservation", "booking", "confirmation", "receipt",
    "notify", "notifications", "noticeboard",
    "team", "media", "insights", "posts-recaps", "event_support", "event-support",
    "hello", "hi", "system", "no_reply",
  ]);

  function ruleClassify(thread) {
    const msgs = thread.messages || [];
    const last = msgs[msgs.length - 1] || {};
    const email = senderEmail(last.sender);
    const domain = senderDomain(last.sender);
    const localPart = email.split("@")[0];
    const subj = (last.subject || "").toLowerCase();

    // 広告ドメイン判定
    const adDomains = Object.keys(adNameMap);
    const isAdDomain = adDomains.some(d => domain === d || domain.endsWith("." + d));
    if (isAdDomain) return { kind: "ad" };

    // ローカル部完全一致
    if (adLocalParts.has(localPart)) return { kind: "ad" };

    // ローカル部 prefix（"store+xxx", "info-xxx", "newsletter-xxx" など）
    if (/^(store\+|store-|noreply|no-reply|newsletter|news-|info-|info\d|notify|alert|update|order|shipment|delivery|tracking|payment|billing|admin|customer|member|press|marketing|promotion|do-not-reply|donotreply|automated|automation|mailer|email|posts-|recap|recaps)/i.test(localPart)) {
      return { kind: "ad" };
    }

    // 件名キーワード
    const adKeywords = ["セール", "キャンペーン", "クーポン", "新商品", "ポイント", "本日限定", "限定", "プレゼント", "オフ", "%off", "newsletter", "メルマガ", "発売", "sale", "ご注文の確認", "発送のお知らせ", "発送されました", "お届け", "invoice", "verify your", "配達済み", "ご注文", "見逃し", "お知らせ", "ご案内", "会員", "メンバー", "ご登録", "ようこそ", "アカウント", "パスワード", "ログイン", "認証", "確認コード", "アンケート", "ご利用", "請求", "明細", "ご請求", "決済", "プラン", "更新しました", "delivered", "shipped", "your order", "weekly", "daily", "discover", "trending", "subscribe", "unsubscribe", "shipping update"];
    if (adKeywords.some(k => subj.includes(k))) {
      return { kind: "ad" };
    }

    // 件名と本文が完全英語（日本語含まず）→ 広告
    const subjOriginal = last.subject || "";
    const snipOriginal = last.snippet || "";
    if (subjOriginal && !hasJapanese(subjOriginal) && !hasJapanese(snipOriginal.slice(0, 200))) {
      return { kind: "ad" };
    }

    return null;
  }

  // AI: 分類 + 要約 + 日本語名（英語Fromの場合）
  async function aiClassifyBatch(threads) {
    const items = threads.map((t, i) => {
      const last = (t.messages || [])[(t.messages || []).length - 1] || {};
      return { idx: i, from: last.sender, subject: last.subject, snippet: (last.snippet || "").slice(0, 400) };
    });
    const prompt = "あなたはコンサート演出家のメール仕分けアシスタントです。各メールについて以下を判定:\n- kind: \"reply\"(要返信、仕事の依頼/相談/確認/図面・資料のやり取り)/\"info\"(情報共有、FYI、議事録、進捗報告)/\"ad\"(広告/通知/ニュースレター/EC配送通知/SNS通知/キャンペーン)\n- displayName: 送信者の正式な日本語フルネーム。fromが既に日本語（漢字/カタカナ）ならそのまま返す。英語のみの場合は本文(snippet)から日本語フルネームを推定（姓名フルネーム、姓だけは避ける。例:「Mika Amashiro」+本文「天白美香」→「天白美香」）。会社名がわかれば「会社名 姓名」形式。手がかりが無ければ from の表示名をそのまま返す\n- summary: kind=\"reply\"または\"info\"のみ生成。メールの要点を日本語30字以内で簡潔に。例:「Zepp大阪の図面確認依頼」。**kind=\"ad\"の場合は必ず空文字\"\"を返す**（広告は要約不要）\n\nJSON配列のみ返答(説明文不要):\n[{\"idx\":0,\"kind\":\"reply\",\"displayName\":\"野村裕紀\",\"summary\":\"国立公演の搬入時間の確認\"},{\"idx\":1,\"kind\":\"ad\",\"displayName\":\"楽天\",\"summary\":\"\"}]";
    try {
      const result = await window.cowork.askClaude(prompt, items);
      let text = result;
      if (typeof result === "object") {
        if (result.content && Array.isArray(result.content)) {
          const t = result.content.find(c => c.type === "text");
          text = t ? t.text : JSON.stringify(result);
        } else if (result.text) text = result.text;
        else text = JSON.stringify(result);
      }
      const m = text.match(/\[[\s\S]*\]/);
      if (!m) return {};
      const parsed = JSON.parse(m[0]);
      const out = {};
      parsed.forEach(p => { out[p.idx] = { kind: p.kind, displayName: p.displayName, summary: p.summary }; });
      return out;
    } catch (e) { return {}; }
  }

  // 表示名：日本語Fromはそのまま、英語Fromは抽出 → AI推定 → そのまま
  function displayNameOf(thread) {
    const last = (thread.messages || [])[(thread.messages || []).length - 1] || {};
    const raw = senderName(last.sender);
    if (thread._kind === "ad") {
      const ad = adDisplayName(last.sender);
      if (ad) return ad;
    }
    if (hasJapanese(raw)) return raw;
    if (thread._displayName && hasJapanese(thread._displayName)) return thread._displayName;
    const fromSnippet = extractJapaneseNameFromSnippet(last.snippet);
    if (fromSnippet) return fromSnippet;
    return raw;
  }

  function renderItems(threads, container) {
    if (!threads || threads.length === 0) {
      container.innerHTML = '<div class="empty">該当メールはありません</div>';
      return;
    }
    const html = threads.map((t, i) => {
      const msgs = t.messages || [];
      const last = msgs[msgs.length - 1] || {};
      const threadCount = msgs.length;
      const kind = t._kind || "loading";
      const hidden = hideAds && kind === "ad" ? ' style="display:none"' : '';
      const summary = t._summary;
      let summaryHtml;
      if (summary) {
        summaryHtml = '<div class="summary">' + escapeHtml(summary) + '</div>';
      } else if (kind === "ad") {
        summaryHtml = '';
      } else {
        // loading中も snippet を薄く出す（"要約生成中…" のスピナー大量表示を回避）
        summaryHtml = '<div class="summary placeholder">' + escapeHtml((last.snippet || "").slice(0, 120)) + '</div>';
      }
      return '<div class="item kind-' + kind + '" data-thread-idx="' + i + '"' + hidden + '>' +
        '<div class="row1">' +
          '<div class="row1-left">' +
            '<span class="dot ' + kind + '"></span>' +
            '<span class="sender">' + escapeHtml(displayNameOf(t)) + '</span>' +
            (threadCount > 1 ? '<span class="badge">' + threadCount + '</span>' : '') +
          '</div>' +
          '<span class="date">' + escapeHtml(fmtDate(last.date)) + '</span>' +
        '</div>' +
        '<div class="subject">' + escapeHtml(last.subject || "(件名なし)") + '</div>' +
        summaryHtml +
      '</div>';
    }).join("");
    container.innerHTML = html;
    container.querySelectorAll(".item").forEach(el => {
      const idx = parseInt(el.dataset.threadIdx, 10);
      el.addEventListener("click", () => openThread(threads[idx]));
    });
  }

  function applyHideAds(container) {
    container.querySelectorAll(".item.kind-ad").forEach(el => { el.style.display = hideAds ? "none" : ""; });
  }

  // モーダル：メール全文表示 + 返信フォーム
  async function openThread(thread) {
    if (!thread) return;
    state.currentThread = thread;
    document.getElementById("modal-bg").classList.add("show");
    const firstMsg = thread.messages && thread.messages[0];
    document.getElementById("modal-title").textContent = (firstMsg && firstMsg.subject) || "(件名なし)";
    document.getElementById("modal-body").innerHTML = '<div class="loading-text">読み込み中…</div>';
    document.getElementById("reply-form").style.display = "none";
    document.getElementById("toast-area").innerHTML = "";
    document.getElementById("open-drafts-link").style.display = "none";
    document.getElementById("open-gmail-link").href = "https://mail.google.com/mail/u/0/#inbox/" + thread.id;

    try {
      const result = await window.cowork.callMcpTool(GET_THREAD_TOOL, { threadId: thread.id, messageFormat: "FULL_CONTENT" });
      const data = parseResult(result);
      const messages = (data && data.messages) || [];
      const html = messages.map(msg => {
        let body = msg.body || msg.snippet || "";
        body = String(body).replace(/<[^>]+>/g, "");
        return '<div class="msg-block">' +
          '<div class="msg-head"><span class="msg-from">' + escapeHtml(senderName(msg.sender)) + '</span> &lt;' + escapeHtml(senderEmail(msg.sender)) + '&gt;<br>' + escapeHtml(fmtFullDate(msg.date)) + '</div>' +
          '<div class="msg-head">To: ' + escapeHtml((msg.toRecipients || []).join(", ")) + (msg.ccRecipients && msg.ccRecipients.length ? '<br>Cc: ' + escapeHtml(msg.ccRecipients.join(", ")) : '') + '</div>' +
          '<div class="msg-body">' + escapeHtml(body) + '</div>' +
        '</div>';
      }).join("");
      document.getElementById("modal-body").innerHTML = html;

      const lastMsg = messages[messages.length - 1] || {};
      const replyTo = senderEmail(lastMsg.sender);
      const rawSubj = lastMsg.subject || "";
      const subj = /^re:/i.test(rawSubj) ? rawSubj : "Re: " + rawSubj;
      const quoted = "\n\n----- " + senderName(lastMsg.sender) + " さんからのメール -----\n" + (lastMsg.body || lastMsg.snippet || "").replace(/<[^>]+>/g, "").split("\n").map(l => "> " + l).join("\n");
      document.getElementById("reply-to").value = replyTo;
      document.getElementById("reply-subject").value = subj;
      document.getElementById("reply-body").value = quoted;
      document.getElementById("reply-form").style.display = "block";
    } catch (e) {
      document.getElementById("modal-body").innerHTML = '<div class="error">取得失敗: ' + escapeHtml(e.message || "") + '</div>';
    }
  }

  function closeModal() {
    document.getElementById("modal-bg").classList.remove("show");
    state.currentThread = null;
  }

  document.getElementById("close-btn").addEventListener("click", closeModal);
  document.getElementById("modal-bg").addEventListener("click", (e) => {
    if (e.target.id === "modal-bg") closeModal();
  });

  // 下書き保存
  document.getElementById("save-draft-btn").addEventListener("click", async () => {
    const btn = document.getElementById("save-draft-btn");
    const toast = document.getElementById("toast-area");
    const to = document.getElementById("reply-to").value.trim();
    const subject = document.getElementById("reply-subject").value.trim();
    const body = document.getElementById("reply-body").value;
    if (!to || !body) { toast.innerHTML = '<div class="toast error">宛先と本文は必須です</div>'; return; }
    btn.disabled = true; btn.textContent = "保存中…";
    toast.innerHTML = "";
    try {
      await window.cowork.callMcpTool(CREATE_DRAFT_TOOL, {
        to: [to], subject: subject, body: body
      });
      toast.innerHTML = '<div class="toast">✅ Gmail下書きフォルダに保存しました。下のボタンで Gmail を開いて編集・送信してください。</div>';
      document.getElementById("open-drafts-link").style.display = "inline-block";
    } catch (e) {
      toast.innerHTML = '<div class="toast error">下書き作成失敗: ' + escapeHtml(e.message || "") + '</div>';
    } finally {
      btn.disabled = false; btn.textContent = "📝 下書きを保存";
    }
  });

  async function classifyAll(threads) {
    const todo = [];
    threads.forEach((t) => {
      if (t._kind && t._kind !== "loading" && t._summary !== undefined && t._displayName !== undefined) return;
      const cached = kindCache[t.id];
      if (cached && cached.summary !== undefined) {
        t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
        return;
      }
      const r = ruleClassify(t);
      if (r && r.kind === "ad") {
        t._kind = "ad"; t._summary = null; t._displayName = null;
        kindCache[t.id] = { kind: "ad", summary: null, displayName: null };
        return;
      }
      todo.push(t);
    });
    if (todo.length > 0) {
      for (let i = 0; i < todo.length; i += 15) {
        const batch = todo.slice(i, i + 15);
        const aiResult = await aiClassifyBatch(batch);
        batch.forEach((t, j) => {
          const r = aiResult[j] || {};
          t._kind = r.kind || "info";
          t._summary = r.summary || null;
          t._displayName = r.displayName || null;
          kindCache[t.id] = { kind: t._kind, summary: t._summary, displayName: t._displayName };
        });
      }
    }
    const keys = Object.keys(kindCache);
    if (keys.length > 1500) {
      const trimmed = {};
      keys.slice(-1500).forEach(k => { trimmed[k] = kindCache[k]; });
      kindCache = trimmed;
    }
    localStorage.setItem(KIND_CACHE_KEY, JSON.stringify(kindCache));
  }

  async function fetchPages(query, pages, pageToken) {
    let allThreads = [];
    let token = pageToken || null;
    for (let p = 0; p < pages; p++) {
      const args = { query: query, pageSize: 50 };
      if (token) args.pageToken = token;
      try {
        const rawResult = await window.cowork.callMcpTool(SEARCH_TOOL, args);
        const data = parseResult(rawResult);
        const threads = (data && data.threads) || [];
        allThreads = allThreads.concat(threads);
        token = (data && data.nextPageToken) || null;
        if (!token) break;
      } catch (e) {
        return { threads: allThreads, nextToken: token, error: e.message };
      }
    }
    return { threads: allThreads, nextToken: token };
  }

  function ensureMoreBtn(sectionKey) {
    const s = state[sectionKey];
    if (!s.btn) {
      s.btn = document.createElement("button");
      s.btn.className = "more-btn";
      s.btn.textContent = "↓ 過去のメールを読み込む";
      s.btn.addEventListener("click", () => loadMore(sectionKey));
    }
    return s.btn;
  }

  async function loadInitial(sectionKey, query) {
    const s = state[sectionKey];
    s.query = query;
    s.threads = [];
    s.nextToken = null;
    s.el.innerHTML = '<div class="loading-text">読み込み中…</div>';
    s.count.textContent = "—";

    const { threads, nextToken, error } = await fetchPages(query, INITIAL_PAGES, null);
    if (error) {
      s.el.innerHTML = '<div class="error">取得失敗: ' + escapeHtml(error) + '</div>';
      s.count.textContent = "!";
      return [];
    }
    const filterFn = s.exactCheck === "to" ? isExactlyToMe : isExactlyCcMe;
    const filtered = threads.filter(filterFn);
    s.threads = filtered;
    s.nextToken = nextToken;
    filtered.forEach(t => {
      const cached = kindCache[t.id];
      if (cached && cached.summary !== undefined) {
        t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
      } else t._kind = "loading";
    });
    renderItems(filtered, s.el);
    if (nextToken) s.el.appendChild(ensureMoreBtn(sectionKey));
    s.count.textContent = filtered.length + (nextToken ? "+" : "");

    await classifyAll(filtered);
    renderItems(filtered, s.el);
    if (s.nextToken) s.el.appendChild(ensureMoreBtn(sectionKey));
    return filtered;
  }

  async function loadMore(sectionKey) {
    const s = state[sectionKey];
    if (!s.nextToken) return;
    const btn = s.btn;
    btn.disabled = true;
    btn.textContent = "↻ 読み込み中…";

    const { threads, nextToken, error } = await fetchPages(s.query, MORE_PAGES, s.nextToken);
    if (error) {
      btn.textContent = "↓ 再試行";
      btn.disabled = false;
      return;
    }
    const filterFn = s.exactCheck === "to" ? isExactlyToMe : isExactlyCcMe;
    const filtered = threads.filter(filterFn);
    s.threads = s.threads.concat(filtered);
    s.nextToken = nextToken;
    s.threads.forEach(t => {
      if (!t._kind) {
        const cached = kindCache[t.id];
        if (cached && cached.summary !== undefined) {
          t._kind = cached.kind; t._summary = cached.summary; t._displayName = cached.displayName || null;
        } else t._kind = "loading";
      }
    });
    renderItems(s.threads, s.el);
    if (nextToken) s.el.appendChild(ensureMoreBtn(sectionKey));
    s.count.textContent = s.threads.length + (nextToken ? "+" : "");
    btn.disabled = false;
    btn.textContent = "↓ 過去のメールを読み込む";

    await classifyAll(s.threads);
    renderItems(s.threads, s.el);
    if (s.nextToken) s.el.appendChild(ensureMoreBtn(sectionKey));
  }

  async function refresh() {
    const unreadFilter = currentFilter === "unread" ? " is:unread" : "";
    const toQuery = "to:" + ME + unreadFilter;
    const ccQuery = "cc:" + ME + unreadFilter;

    state.to.el = document.getElementById("list-to");
    state.to.count = document.getElementById("count-to");
    state.cc.el = document.getElementById("list-cc");
    state.cc.count = document.getElementById("count-cc");

    document.getElementById("stats").textContent = "読み込み中…";
    const [toThreads, ccThreads] = await Promise.all([
      loadInitial("to", toQuery),
      loadInitial("cc", ccQuery),
    ]);
    const toReply = (toThreads || []).filter(t => t._kind === "reply").length;
    const ccReply = (ccThreads || []).filter(t => t._kind === "reply").length;
    document.getElementById("stats").innerHTML =
      'To <strong>' + (toThreads || []).length + '</strong> · 要返信 <strong>' + toReply + '</strong>　/　' +
      'Cc <strong>' + (ccThreads || []).length + '</strong> · 要返信 <strong>' + ccReply + '</strong>';
  }

  function setFilter(f) {
    currentFilter = f;
    localStorage.setItem(STORE_KEY, f);
    document.getElementById("filter-unread").classList.toggle("active", f === "unread");
    document.getElementById("filter-all").classList.toggle("active", f === "all");
    refresh();
  }

  document.getElementById("filter-unread").addEventListener("click", () => setFilter("unread"));
  document.getElementById("filter-all").addEventListener("click", () => setFilter("all"));
  document.getElementById("hide-ads").addEventListener("change", (e) => {
    hideAds = e.target.checked;
    localStorage.setItem(HIDE_KEY, hideAds ? "1" : "0");
    applyHideAds(document.getElementById("list-to"));
    applyHideAds(document.getElementById("list-cc"));
  });

  refresh();
})();
</script>
